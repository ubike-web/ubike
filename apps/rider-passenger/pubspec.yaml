name: ubike_rider_passenger
description: u-bike Passenger Rider App
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  geolocator: ^12.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_map_location_marker: ^8.0.5
  flutter_map_cancellable_tile_provider: ^2.0.0
  socket_io_client: ^2.0.3+1
  pinput: ^3.0.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  gap: ^3.0.1
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
