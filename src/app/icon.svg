  <circle cx="16" cy="42" r="9" stroke="#BF9340" stroke-width="2.5" fill="none"/>
  <circle cx="16" cy="42" r="3" fill="#BF9340"/>

  <!-- Front wheel -->
  <circle cx="48" cy="42" r="9" stroke="#BF9340" stroke-width="2.5" fill="none"/>
